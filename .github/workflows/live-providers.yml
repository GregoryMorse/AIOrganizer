name: Protected provider smoke tests

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * 6"

permissions:
  contents: read

jobs:
  smoke:
    environment: live-providers
    runs-on: windows-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "0.9.18"
      - run: uv python install 3.12
      - run: uv sync --extra providers --extra dev
      - run: uv run pytest -m live_provider

  codex-subscription:
    if: ${{ vars.ENABLE_CODEX_SUBSCRIPTION_SMOKE == 'true' }}
    environment: live-providers
    runs-on: [self-hosted, aiorganizer-codex]
    env:
      AIORGANIZER_CODEX_LIVE: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "0.9.18"
      - run: uv python install 3.12
      - run: uv sync --extra providers --extra dev
      - run: uv run pytest tests/live/test_providers.py -k codex_subscription
