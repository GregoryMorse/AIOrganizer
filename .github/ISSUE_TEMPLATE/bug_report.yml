name: Bug report
description: Report a reproducible problem without private data
body:
  - type: markdown
    attributes:
      value: Do not attach personal documents, workspace files, credentials, or private paths.
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AIOrganizer version
    validations:
      required: true
